<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студия графического дизайна</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400&display=swap" rel="stylesheet">
    <style>
        /* ===== СБРОС ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdf8f0;
            color: #2c3e50;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
        }

        /* Холст для анимации "Матрица" — фон */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Весь контент поверх canvas */
        .content {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 30px 40px;
            background: rgba(253, 248, 240, 0.92);
            backdrop-filter: blur(6px);
            min-height: 100vh;
            box-shadow: 0 0 80px rgba(44, 62, 80, 0.03);
            border-left: 1px solid rgba(44, 62, 80, 0.06);
            border-right: 1px solid rgba(44, 62, 80, 0.06);
        }

        /* ===== ЦВЕТА ===== */
        .color-accent {
            color: #c0392b;
        }

        .color-accent-bright {
            color: #e74c3c;
        }

        /* ===== АНИМАЦИЯ СВЕЧЕНИЯ ПО КОНТУРУ ===== */
        @keyframes borderGlow {
            0%, 100% {
                box-shadow: 
                    0 0 20px rgba(231, 76, 60, 0.15),
                    0 0 40px rgba(231, 76, 60, 0.08),
                    0 0 60px rgba(231, 76, 60, 0.04);
                border-color: rgba(231, 76, 60, 0.25);
            }
            50% {
                box-shadow: 
                    0 0 40px rgba(231, 76, 60, 0.30),
                    0 0 80px rgba(231, 76, 60, 0.15),
                    0 0 120px rgba(231, 76, 60, 0.06);
                border-color: rgba(231, 76, 60, 0.5);
            }
        }

        /* ===== ХЕДЕР ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 25px;
            border-bottom: 1px solid rgba(44, 62, 80, 0.08);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: 200;
            letter-spacing: 5px;
            color: #2c3e50;
            text-transform: uppercase;
        }

        .logo span {
            font-weight: 200;
            color: #2c3e50;
            letter-spacing: 3px;
        }

        .header-phone {
            color: #2c3e50;
            text-decoration: none;
            font-size: 15px;
            font-weight: 200;
            letter-spacing: 4px;
            padding: 12px 34px;
            border-radius: 50px;
            border: 1px solid rgba(44, 62, 80, 0.08);
            background: transparent;
            text-transform: uppercase;
            display: inline-block;
            transition: all 0.6s ease;
        }

        .header-phone:hover {
            transform: translateY(-1px);
            animation: borderGlow 2s ease-in-out infinite;
            border-color: rgba(231, 76, 60, 0.25);
        }

        /* ===== ГЕРОЙ ===== */
        .hero {
            padding: 70px 0 40px;
            text-align: center;
        }

        .hero h1 {
            font-size: 54px;
            font-weight: 200;
            line-height: 1.2;
            margin-bottom: 0px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #e74c3c;
        }

        /* ===== ОСНОВНЫЕ УСЛУГИ ===== */
        .main-services {
            padding: 30px 0 40px;
        }

        .main-services-title {
            font-size: 16px;
            font-weight: 200;
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: #c0392b;
        }

        .main-services-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 100%;
            margin: 0 auto;
        }

        .main-service-item {
            background: rgba(255, 255, 255, 0.6);
            padding: 48px 28px;
            border-radius: 16px;
            border: 1px solid rgba(44, 62, 80, 0.08);
            text-align: center;
            transition: all 0.6s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 180px;
            min-height: 180px;
            position: relative;
        }

        .main-service-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.85);
            animation: borderGlow 2.5s ease-in-out infinite;
            border-color: rgba(231, 76, 60, 0.25);
        }

        .main-service-item h3 {
            font-size: 24px;
            font-weight: 200;
            color: #2c3e50;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .main-service-item p {
            font-size: 16px;
            font-weight: 200;
            color: rgba(44, 62, 80, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ===== ДОПОЛНИТЕЛЬНЫЕ ВОЗМОЖНОСТИ ===== */
        .additional {
            padding: 10px 0 20px;
        }

        .additional-title {
            font-size: 16px;
            font-weight: 200;
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: #c0392b;
        }

        .additional-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 100%;
            margin: 0 auto;
        }

        .additional-item {
            background: rgba(255, 255, 255, 0.6);
            padding: 48px 20px;
            border-radius: 16px;
            border: 1px solid rgba(44, 62, 80, 0.08);
            text-align: center;
            transition: all 0.6s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 180px;
            min-height: 180px;
            position: relative;
        }

        .additional-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.85);
            animation: borderGlow 2.5s ease-in-out infinite;
            border-color: rgba(231, 76, 60, 0.25);
        }

        .additional-item h4 {
            font-size: 20px;
            font-weight: 200;
            margin-bottom: 6px;
            color: #2c3e50;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .additional-item p {
            color: rgba(44, 62, 80, 0.5);
            font-size: 15px;
            font-weight: 200;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ===== ПОДВАЛ С КОНТАКТАМИ ===== */
        footer {
            padding: 40px 0 20px;
            margin-top: 20px;
            text-align: center;
        }

        footer .footer-title {
            font-size: 18px;
            font-weight: 200;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: #c0392b;
        }

        .footer-contacts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            max-width: 100%;
            margin: 0 auto;
        }

        .footer-contacts a {
            color: #2c3e50;
            text-decoration: none;
            font-size: 15px;
            font-weight: 200;
            letter-spacing: 4px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(44, 62, 80, 0.08);
            background: transparent;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            transition: all 0.6s ease;
            position: relative;
        }

        .footer-contacts a:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.3);
            animation: borderGlow 2s ease-in-out infinite;
            border-color: rgba(231, 76, 60, 0.25);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 768px) {
            .content {
                padding: 15px;
                background: rgba(253, 248, 240, 0.92);
            }

            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .hero {
                padding: 50px 0 30px;
            }

            .hero h1 {
                font-size: 34px;
                letter-spacing: 2px;
            }

            .main-service-item {
                height: 150px;
                min-height: 150px;
                padding: 36px 20px;
            }

            .main-service-item h3 {
                font-size: 20px;
                letter-spacing: 4px;
            }

            .main-service-item p {
                font-size: 14px;
                letter-spacing: 3px;
            }

            .additional-grid {
                grid-template-columns: 1fr 1fr;
            }

            .additional-item {
                height: 150px;
                min-height: 150px;
                padding: 36px 16px;
            }

            .additional-item h4 {
                font-size: 17px;
                letter-spacing: 3px;
            }

            .additional-item p {
                font-size: 13px;
                letter-spacing: 2px;
            }

            .footer-contacts {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .footer-contacts a {
                font-size: 13px;
                letter-spacing: 3px;
                padding: 10px 16px;
            }

            footer .footer-title {
                font-size: 16px;
                letter-spacing: 4px;
                margin-bottom: 25px;
            }

            .header-phone {
                font-size: 13px;
                letter-spacing: 3px;
                padding: 10px 24px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px;
                letter-spacing: 1.5px;
            }

            .additional-grid {
                grid-template-columns: 1fr;
            }

            .main-service-item {
                height: 130px;
                min-height: 130px;
                padding: 28px 16px;
            }

            .main-service-item h3 {
                font-size: 18px;
                letter-spacing: 3px;
            }

            .main-service-item p {
                font-size: 13px;
                letter-spacing: 2px;
            }

            .additional-item {
                height: 130px;
                min-height: 130px;
                padding: 28px 16px;
            }

            .additional-item h4 {
                font-size: 16px;
                letter-spacing: 2px;
            }

            .additional-item p {
                font-size: 13px;
                letter-spacing: 1.5px;
            }

            .footer-contacts {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .footer-contacts a {
                font-size: 14px;
                letter-spacing: 3px;
                padding: 12px 20px;
            }

            .header-phone {
                font-size: 12px;
                letter-spacing: 2px;
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ХОЛСТ ДЛЯ МАТРИЦЫ ===== -->
    <canvas id="matrixCanvas"></canvas>

    <!-- ===== КОНТЕНТ ===== -->
    <div class="content">

        <!-- HEADER -->
        <header>
            <div class="logo"><span>✦</span> STUDIO</div>
            <div>
                <a href="tel:+79999999999" class="header-phone">+7 999 999-99-99</a>
            </div>
        </header>

        <!-- HERO -->
        <section class="hero">
            <h1>
                СОЗДАЕМ ДИЗАЙН, КОТОРЫЙ<br>
                ЗАПОМИНАЕТСЯ НАДОЛГО
            </h1>
        </section>

        <!-- ОСНОВНЫЕ УСЛУГИ -->
        <section class="main-services">
            <div class="main-services-title">ОСНОВНОЕ НАПРАВЛЕНИЕ</div>
            <div class="main-services-grid">
                <div class="main-service-item">
                    <h3>КРАСИВЫЕ САЙТЫ</h3>
                    <p>УНИКАЛЬНЫЙ ДИЗАЙН, ПОЛНЫЙ КОД</p>
                </div>
            </div>
        </section>

        <!-- ДОПОЛНИТЕЛЬНЫЕ ВОЗМОЖНОСТИ -->
        <section class="additional">
            <div class="additional-title">ДОПОЛНИТЕЛЬНЫЕ ВОЗМОЖНОСТИ</div>
            <div class="additional-grid">
                <div class="additional-item">
                    <h4>TELEGRAM-БОТЫ</h4>
                    <p>АВТОМАТИЗАЦИЯ, ПРОДАЖИ</p>
                </div>
                <div class="additional-item">
                    <h4>МОБИЛЬНЫЕ ПРИЛОЖЕНИЯ</h4>
                    <p>IOS И ANDROID</p>
                </div>
            </div>
        </section>

        <!-- FOOTER WITH CONTACTS -->
        <footer id="contact">
            <div class="footer-title">СВЯЖИТЕСЬ С НАМИ</div>
            <div class="footer-contacts">
                <a href="#">TELEGRAM</a>
                <a href="#">WHATSAPP</a>
                <a href="#">MAX</a>
                <a href="#">EMAIL</a>
            </div>
        </footer>

    </div>

    <!-- ===== СКРИПТ МАТРИЦЫ ===== -->
    <script>
        (function matrixRain() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;

            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*()_+-=[]{}|;:,.<>?';
            const charArray = chars.split('');

            const fontSize = 15;
            const columns = Math.floor(width / fontSize);
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }

            function draw() {
                ctx.fillStyle = 'rgba(253, 248, 240, 0.02)';
                ctx.fillRect(0, 0, width, height);

                ctx.font = fontSize + 'px monospace';
                ctx.textAlign = 'center';

                for (let i = 0; i < drops.length; i++) {
                    const char = charArray[Math.floor(Math.random() * charArray.length)];
                    const x = i * fontSize + fontSize / 2;
                    const y = drops[i] * fontSize;

                    const brightness = 0.4 + Math.random() * 0.6;
                    
                    const r = 200 + Math.random() * 55;
                    const g = 50 + Math.random() * 40;
                    const b = 30 + Math.random() * 30;
                    
                    ctx.shadowColor = `rgba(200, 50, 30, ${brightness * 0.5})`;
                    ctx.shadowBlur = 25;
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.6 + brightness * 0.4})`;
                    ctx.fillText(char, x, y);
                    ctx.shadowBlur = 0;

                    if (y > height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }

                    drops[i]++;
                }
            }

            function resizeCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                const newColumns = Math.floor(width / fontSize);
                if (newColumns > drops.length) {
                    for (let i = drops.length; i < newColumns; i++) {
                        drops[i] = Math.random() * -100;
                    }
                } else if (newColumns < drops.length) {
                    drops.length = newColumns;
                }
            }

            window.addEventListener('resize', resizeCanvas);
            setInterval(draw, 45);
        })();
    </script>

</body>
</html>
