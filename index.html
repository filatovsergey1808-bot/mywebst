<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Террасная доска | PRINCIP FLOOR</title>
    <meta name="description" content="Премиальная террасная доска из натурального дерева и ДПК. PRINCIP FLOOR — качество, проверенное временем.">
    <meta name="keywords" content="террасная доска, декинг, ДПК, лиственница, PRINCIP FLOOR">
    
    <!-- Подключаем Swiper.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        /* ================================================================
           ОСНОВНОЙ ФОН
           ================================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
            background: #F0F3F8;
            color: #1A1A2E;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Геометрический фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 85, 164, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(0, 85, 164, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 85, 165, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, #F8F9FC 0%, #E8ECF4 100%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 60px,
                    rgba(0, 85, 164, 0.04) 60px,
                    rgba(0, 85, 164, 0.07) 61px,
                    rgba(0, 85, 164, 0.04) 62px,
                    transparent 63px,
                    transparent 120px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent 0px,
                    transparent 200px,
                    rgba(0, 85, 164, 0.025) 200px,
                    rgba(0, 85, 164, 0.06) 202px,
                    rgba(0, 85, 164, 0.025) 204px,
                    transparent 206px,
                    transparent 400px
                ),
                repeating-linear-gradient(
                    30deg,
                    transparent 0px,
                    transparent 140px,
                    rgba(0, 85, 164, 0.02) 140px,
                    rgba(0, 85, 164, 0.05) 141px,
                    rgba(0, 85, 164, 0.02) 142px,
                    transparent 143px,
                    transparent 280px
                ),
                repeating-linear-gradient(
                    -30deg,
                    transparent 0px,
                    transparent 90px,
                    rgba(0, 85, 164, 0.03) 90px,
                    rgba(0, 85, 164, 0.08) 92px,
                    rgba(0, 85, 164, 0.03) 94px,
                    transparent 96px,
                    transparent 180px
                );
            transform: rotate(0deg) scale(1.1);
            animation: gridFloat 25s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes gridFloat {
            0% { transform: rotate(0deg) scale(1.05) translate(0, 0); }
            20% { transform: rotate(0.5deg) scale(1.08) translate(1%, -1%); }
            40% { transform: rotate(-0.3deg) scale(1.03) translate(-1%, 1%); }
            60% { transform: rotate(0.8deg) scale(1.1) translate(1%, 1%); }
            80% { transform: rotate(-0.5deg) scale(1.06) translate(-1%, -1%); }
            100% { transform: rotate(0.3deg) scale(1.12) translate(0, 0); }
        }

        .geo-shapes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .geo-shape {
            position: absolute;
            border: 1px solid rgba(0, 85, 164, 0.04);
            border-radius: 2px;
            animation: shapeFloat 18s ease-in-out infinite alternate;
        }

        .geo-shape:nth-child(1) {
            width: 400px;
            height: 200px;
            top: -50px;
            right: -100px;
            transform: rotate(25deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 22s;
        }

        .geo-shape:nth-child(2) {
            width: 150px;
            height: 300px;
            bottom: 50px;
            left: -60px;
            transform: rotate(-15deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 26s;
            animation-delay: -6s;
        }

        .geo-shape:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 35%;
            left: 55%;
            transform: rotate(45deg);
            background: linear-gradient(45deg, rgba(0, 85, 164, 0.02), rgba(0, 85, 164, 0.06));
            animation-duration: 30s;
            animation-delay: -12s;
        }

        .geo-shape:nth-child(4) {
            width: 250px;
            height: 150px;
            top: 15%;
            left: 15%;
            transform: rotate(60deg);
            background: linear-gradient(135deg, rgba(0, 85, 164, 0.01), rgba(0, 85, 164, 0.04));
            animation-duration: 24s;
            animation-delay: -4s;
        }

        .geo-shape:nth-child(5) {
            width: 180px;
            height: 180px;
            bottom: -30px;
            right: 25%;
            transform: rotate(-30deg);
            background: linear-gradient(225deg, rgba(0, 85, 164, 0.015), rgba(0, 85, 164, 0.05));
            animation-duration: 28s;
            animation-delay: -9s;
        }

        @keyframes shapeFloat {
            0% { transform: rotate(25deg) translate(0, 0) scale(1); opacity: 0.4; }
            33% { transform: rotate(35deg) translate(12px, -18px) scale(1.06); opacity: 0.9; }
            66% { transform: rotate(15deg) translate(-12px, 12px) scale(0.94); opacity: 0.5; }
            100% { transform: rotate(30deg) translate(6px, -6px) scale(1.03); opacity: 0.7; }
        }

        @keyframes shapeFloat2 {
            0% { transform: rotate(-15deg) translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: rotate(-25deg) translate(-18px, 12px) scale(1.08); opacity: 0.8; }
            100% { transform: rotate(-5deg) translate(12px, -12px) scale(0.94); opacity: 0.5; }
        }

        @keyframes shapeFloat3 {
            0% { transform: rotate(45deg) translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: rotate(55deg) translate(10px, -15px) scale(1.1); opacity: 0.8; }
        }

        .geo-shape:nth-child(2) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(3) { animation-name: shapeFloat3; }
        .geo-shape:nth-child(4) { animation-name: shapeFloat2; }
        .geo-shape:nth-child(5) { animation-name: shapeFloat3; }

        /* ================================================================
           ОСНОВНОЙ КОНТЕНТ
           ================================================================ */
        #app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ================================================================
           ВЕРХНЯЯ ПАНЕЛЬ — логотип и контакты
           ================================================================ */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px 0;
            gap: 20px;
        }

        .top-bar .social-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-start;
        }

        .top-bar .social-left .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(0, 85, 164, 0.06);
            color: #0055A4;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 85, 164, 0.06);
            padding: 0;
        }

        .top-bar .social-left .social-icon:hover {
            background: #0055A4;
            color: #ffffff;
            border-color: #0055A4;
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(0, 85, 164, 0.2);
        }

        .top-bar .social-left .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            display: block;
        }

        .top-bar .social-left .social-icon:hover svg {
            fill: #ffffff;
        }

        .top-bar .logo-center {
            flex: 0 0 auto;
        }

        .top-bar .logo-center img {
            display: block;
            width: 220px;
            height: auto;
            filter: drop-shadow(0 2px 12px rgba(0, 85, 164, 0.08));
            transition: filter 0.3s ease;
            cursor: pointer;
        }

        .top-bar .logo-center img:hover {
            filter: drop-shadow(0 4px 24px rgba(0, 85, 164, 0.16));
        }

        .top-bar .contact-right {
            flex: 1;
            text-align: right;
            font-size: 14px;
            color: #4A4A5A;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .top-bar .contact-right a {
            color: #0055A4;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .top-bar .contact-right a:hover {
            color: #003D7A;
        }

        /* ================================================================
           ШАПКА
           ================================================================ */
        .header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 32px 32px 28px 32px;
            margin-bottom: 28px;
            text-align: center;
            border: 1px solid rgba(0, 85, 164, 0.2);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                repeating-linear-gradient(
                    15deg,
                    transparent 0px,
                    transparent 80px,
                    rgba(0, 85, 164, 0.03) 80px,
                    rgba(0, 85, 164, 0.06) 81px,
                    rgba(0, 85, 164, 0.03) 82px,
                    transparent 83px,
                    transparent 160px
                ),
                repeating-linear-gradient(
                    -25deg,
                    transparent 0px,
                    transparent 120px,
                    rgba(0, 85, 164, 0.02) 120px,
                    rgba(0, 85, 164, 0.05) 122px,
                    rgba(0, 85, 164, 0.02) 124px,
                    transparent 126px,
                    transparent 240px
                );
            opacity: 0.5;
        }

        .header h1 {
            position: relative;
            z-index: 1;
            font-size: 48px;
            font-weight: 200;
            letter-spacing: 6px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1.05;
        }

        .header .subtitle {
            position: relative;
            z-index: 1;
            font-size: 18px;
            font-weight: 200;
            color: #4A4A5A;
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* ================================================================
           КАРУСЕЛЬ — SWIPER.JS
           ================================================================ */
        .carousel-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: visible;
            background: transparent;
            backdrop-filter: none;
            border: none;
            width: 100%;
            padding-bottom: 100%;
            position: relative;
        }

        .swiper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .swiper-wrapper {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 16px;
            height: 100%;
            width: 100%;
            overflow: visible;
        }

        /* ================================================================
           КАРТОЧКА — 4 ЧЕТВЕРТИ
           ================================================================ */
        .card {
            flex: 0 0 100%;
            max-width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s ease;
            border: 1.5px solid transparent;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 85, 164, 0.06);
            opacity: 0.3;
            transform: scale(0.85);
            filter: blur(4px);
            pointer-events: none;
            margin: 4px;
            position: relative;
        }

        .swiper-slide-active .card {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            pointer-events: all;
            border-color: rgba(0, 85, 164, 0.15);
            box-shadow: 0 12px 50px rgba(0, 85, 164, 0.12);
            z-index: 3;
        }

        .swiper-slide-active .card:hover {
            transform: scale(1.04);
            box-shadow: 0 16px 60px rgba(0, 85, 164, 0.15);
            border-color: rgba(0, 85, 164, 0.25);
            background: rgba(255, 255, 255, 0.98);
        }

        .card .image {
            width: 100%;
            height: 70%;
            object-fit: cover;
            display: block;
            background: #E8ECF0;
            flex-shrink: 0;
        }

        .card .image-placeholder {
            width: 100%;
            height: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: #E8ECF0;
            color: #B0B8C0;
            flex-shrink: 0;
        }

        /* ================================================================
           ИНФОРМАЦИОННАЯ ОБЛАСТЬ — 4 ЧЕТВЕРТИ
           ================================================================ */
        .card .info {
            padding: 14px 18px 16px;
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 30%;
            gap: 4px 12px;
            position: relative;
        }

        /* 1-я четверть: Название — по центру, занимает всю четверть */
        .card .info .name {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            font-weight: 300;
            font-size: clamp(28px, 3.8vw, 44px);
            letter-spacing: 3px;
            color: #000000;
            text-transform: uppercase;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
            padding: 0 4px;
        }

        /* 2-я и 3-я четверти: Описание — по левому краю, сверху */
        .card .info .description {
            grid-column: 2 / 3;
            grid-row: 1 / 3;
            font-size: clamp(13px, 1.4vw, 17px);
            font-weight: 300;
            color: #4A4A5A;
            line-height: 1.6;
            letter-spacing: 0.3px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
            padding-left: 4px;
            padding-top: 2px;
            width: 100%;
            height: 100%;
        }

        /* 4-я четверть: Цена — по центру, занимает всю четверть, тот же цвет что и название */
        .card .info .price {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            color: #000000;
            font-size: clamp(24px, 3.2vw, 38px);
            font-weight: 300;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
            padding: 0 4px;
        }

        /* ================================================================
           КНОПКИ НАВИГАЦИИ SWIPER
           ================================================================ */
        .swiper-button-prev,
        .swiper-button-next {
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 10;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 85, 164, 0.1);
            transition: all 0.3s ease;
            padding: 0;
            opacity: 0.2;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 0;
            width: 80px;
            height: 100%;
            margin: 0;
        }

        .swiper-button-prev {
            left: 0;
            justify-content: flex-start;
            padding-left: 8px;
        }

        .swiper-button-next {
            right: 0;
            justify-content: flex-end;
            padding-right: 8px;
        }

        .swiper-button-prev:hover,
        .swiper-button-next:hover {
            opacity: 0.6;
            color: #0055A4;
            background: rgba(0, 85, 164, 0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .swiper-button-prev:active,
        .swiper-button-next:active {
            transform: scale(0.95);
        }

        .swiper-button-prev::after,
        .swiper-button-next::after {
            display: none;
        }

        .swiper-button-prev svg,
        .swiper-button-next svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .swiper-button-prev:hover svg,
        .swiper-button-next:hover svg {
            transform: scale(1.15);
        }

        /* ================================================================
           ТОЧКИ SWIPER
           ================================================================ */
        .swiper-pagination {
            position: relative;
            bottom: auto;
            padding: 16px 0 8px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .swiper-pagination-bullet {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 85, 164, 0.15);
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 1;
            margin: 0 !important;
        }

        .swiper-pagination-bullet-active {
            background: #0055A4;
            border-color: #0055A4;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(0, 85, 164, 0.15);
        }

        .swiper-pagination-bullet:hover {
            border-color: #0055A4;
            transform: scale(1.1);
        }

        /* ================================================================
           ФУТЕР (без копирайта)
           ================================================================ */
        .footer {
            text-align: center;
            padding: 16px 14px 8px 14px;
            border-top: 1px solid rgba(0, 85, 164, 0.04);
            margin-top: 8px;
        }

        .footer .contacts {
            font-size: 13px;
            color: #8A8A9A;
        }

        .footer .contacts a {
            color: #0055A4;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 400;
        }

        .footer .contacts a:hover {
            color: #003D7A;
        }

        /* ================================================================
           МОДАЛЬНОЕ ОКНО
           ================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 85, 164, 0.12);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 80px rgba(0, 85, 164, 0.15);
            animation: modalFadeIn 0.4s ease;
            max-height: 90vh;
            overflow-y: auto;
            border-top: 4px solid #0055A4;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            color: #8A8A9A;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 0 4px;
        }

        .modal .modal-close:hover {
            color: #1A1A2E;
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 200;
            letter-spacing: 2px;
            color: #000000;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 6px;
        }

        .modal .modal-price {
            font-size: 20px;
            color: #000000;
            font-weight: 300;
            margin-bottom: 12px;
        }

        .modal .modal-desc {
            font-size: 15px;
            color: #4A4A5A;
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .modal .modal-section {
            padding: 12px 0;
            border-top: 1px solid rgba(0, 85, 164, 0.04);
        }

        .modal .modal-section h4 {
            font-size: 12px;
            letter-spacing: 1px;
            color: #8A8A9A;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 400;
        }

        .modal .modal-section p {
            font-size: 15px;
            color: #4A4A5A;
            font-weight: 300;
            line-height: 1.6;
            white-space: pre-line;
        }

        .modal .btn-close-modal {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #0055A4;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 85, 164, 0.2);
        }

        .modal .btn-close-modal:hover {
            background: #003D7A;
            box-shadow: 0 8px 30px rgba(0, 85, 164, 0.3);
            transform: translateY(-2px);
        }

        /* ================================================================
           АДАПТИВНОСТЬ
           ================================================================ */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .top-bar {
                flex-direction: column;
                padding: 4px 0 12px 0;
                gap: 10px;
            }

            .top-bar .social-left {
                flex: none;
                justify-content: center;
                width: 100%;
            }

            .top-bar .logo-center img {
                width: 180px;
            }

            .top-bar .contact-right {
                flex: none;
                text-align: center;
                font-size: 13px;
                width: 100%;
            }

            .header {
                padding: 24px 20px 20px 20px;
                margin-bottom: 20px;

        // ================================================================

        let swiper = null;

        function initSwiper() {
            const wrapper = document.getElementById('swiperWrapper');
            
            wrapper.innerHTML = '';
            
            categories.forEach((cat) => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="image" src="${cat.image}" alt="${cat.name}" loading="lazy" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="image-placeholder" style="display:none;">📦</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                        <div class="description">${cat.description}</div>
                        <div class="price">${cat.price}</div>
                    </div>
                `;
                card.onclick = () => openModal(cat.id);
                slide.appendChild(card);
                wrapper.appendChild(slide);
            });

            swiper = new Swiper('.mySwiper', {
                loop: true,
                speed: 1600,
                slidesPerView: 1,
                spaceBetween: 0,
                centeredSlides: true,
                effect: 'slide',
                watchSlidesProgress: true,
                
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev',
                },
                
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                    bulletClass: 'swiper-pagination-bullet',
                    bulletActiveClass: 'swiper-pagination-bullet-active',
                },
                
                autoplay: {
                    delay: 4000,
                    disableOnInteraction: false,
                    pauseOnMouseEnter: true,
                    waitForTransition: true,
                    stopOnLastSlide: false,
                },
                
                keyboard: {
                    enabled: true,
                    onlyInViewport: true,
                },
                
                touchRatio: 1,
                touchAngle: 45,
                resistance: true,
                resistanceRatio: 0.85,
                loopAdditionalSlides: 1,
                autoHeight: false,
                
                on: {
                    autoplayStop: function() {
                        setTimeout(() => {
                            if (swiper && !swiper.destroyed) {
                                swiper.autoplay.start();
                            }
                        }, 100);
                    }
                }
            });

            document.querySelector('.swiper-button-prev').addEventListener('click', () => {
                swiper.slidePrev();
            });
            
            document.querySelector('.swiper-button-next').addEventListener('click', () => {
                swiper.slideNext();
            });
        }

        // ================================================================
        // МОДАЛЬНОЕ ОКНО
        // ================================================================
        function openModal(id) {
            const data = categories.find(c => c.id === id);
            const detail = details[id];
            if (!data || !detail) return;

            document.getElementById('modalName').textContent = data.name;
            document.getElementById('modalPrice').textContent = data.price;
            document.getElementById('modalDesc').textContent = detail.desc;
            document.getElementById('modalPros').textContent = detail.pros;
            document.getElementById('modalCons').textContent = detail.cons;
            document.getElementById('modalCare').textContent = detail.care;
            document.getElementById('modalSpecs').textContent = detail.specs;

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            if (swiper && !swiper.destroyed) {
                swiper.autoplay.stop();
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
            
            if (swiper && !swiper.destroyed) {
                swiper.autoplay.start();
            }
        }

        // ЗАПУСК

            initSwiper();

            document.getElementById('modalClose').onclick = closeModal;
            document.getElementById('modalCloseBtn').onclick = closeModal;
            document.getElementById('modalOverlay').onclick = (e) => {
                if (e.target === e.currentTarget) closeModal();
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        });
